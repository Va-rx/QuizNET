version: "3"
services:
    postgre_quiznet:
        container_name: postgre_quiznet
        image: postgres:latest
        restart: always
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: zaq1@WSX
            POSTGRES_DB: quiznet
        ports:
            - "5432:5432"
        networks:
            - quiznet-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready"]
            interval: 10s
            timeout: 5s
            retries: 5
networks:
    quiznet-network:
        driver: bridge
        external: true
