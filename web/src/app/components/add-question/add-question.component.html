<div>
  <div class="submit-form">
    <div *ngIf="!submitted">
      <div class="form-group">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Kreator Pytań</mat-card-title>
          </mat-card-header>
          <mat-card-content>

            <mat-card>
              <mat-card-header>
                <mat-card-title>Pytanie</mat-card-title>
                <mat-card-subtitle>Wprowadź treść pytania i dodaj zdjęcie</mat-card-subtitle>
              </mat-card-header>
              <mat-card-content>
                <mat-form-field appearance="outline">
                  <textarea matInput placeholder="Pytanie" [(ngModel)]="question.question" name="question"
                    required></textarea>
                </mat-form-field>
                <div class="second-row">
                  <mat-form-field appearance="outline" style="width: 70px">
                    <input matInput type="number" [(ngModel)]="question.points">
                  </mat-form-field>
                  <span>%</span>
                <input type="file" (change)="onFileChange($event)">
                </div>
              </mat-card-content>

            </mat-card>

            <mat-card style="margin-top: 20px">
              <mat-card-header *ngIf="answers.length > 0">
                <mat-card-title>Stwórz odpowiedzi</mat-card-title>
              </mat-card-header>
              <mat-card-content class="answer" *ngFor="let answer of answers; let i = index;">
                  <mat-form-field appearance="outline">
                    <textarea matInput placeholder="Odpowiedź" [(ngModel)]="answer.answer" name="answer"
                      required></textarea>
                  </mat-form-field>
                <div class="second-row">
                  <mat-form-field appearance="outline" style="width: 70px">
                    <input matInput type="number" [(ngModel)]="answer.percentagePoints">
                  </mat-form-field>
                 <span>%</span>
                <mat-checkbox [(ngModel)]="answer.isCorrect">
                  Czy jest poprawna?
                </mat-checkbox>
                <button *ngIf="answers.length > 2" mat-button (click)="deleteAnswer(i)"><mat-icon>delete</mat-icon></button>
              </div>

                  <mat-divider></mat-divider>
              </mat-card-content>
            </mat-card>

          </mat-card-content>

          <mat-card-actions>
            <button mat-button (click)="addAnswer()"><mat-icon>add</mat-icon> Dodaj odpowiedź</button>
          </mat-card-actions>
        </mat-card>

      </div>

      <button (click)="saveQuestion()" class="btn btn-success">Submit</button>
    </div>

    <div *ngIf="submitted">
      <h4>Question was submitted successfully!</h4>
      <button class="btn btn-success" (click)="newQuestion()">Add</button>
    </div>
  </div>
</div>
