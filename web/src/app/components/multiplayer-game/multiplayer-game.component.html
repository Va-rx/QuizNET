<app-scoreboard *ngIf="gameFinished" [testName]="testName" [scoreboard]="scoreBoardMap" [currentPlayer]="nickname" [killerScore]="killerScore" [socializerScore]="socializerScore" [totalScore]="testMaxPoints"></app-scoreboard>
<app-timer *ngIf="!timerEnded" [seconds]="timer" (timerEnded)="onTimerEnded()"></app-timer>
