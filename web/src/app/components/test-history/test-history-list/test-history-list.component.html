<div class="container mt-4">

<table style="border: #695497 3px" mat-table [dataSource]="userResults" class="mat-elevation-z8 results-table" matSort>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef class="header" mat-sort-header> Name </th>
    <td mat-cell *matCellDef="let element" class="header"> {{element.name}} </td>
  </ng-container>

  <ng-container matColumnDef="score">
    <th mat-header-cell *matHeaderCellDef class="header" mat-sort-header> Score </th>
    <td mat-cell *matCellDef="let element" class="header"> {{element.score}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr class="result-row" mat-row (click)="goToDetails(row)" *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
</div>
