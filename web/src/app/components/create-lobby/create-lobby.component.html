<div class="container d-flex flex-wrap justify-content-around align-items-start mt-5">
  <div class="col-md-4 lobby-card">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h4>Create Lobby</h4>
      </div>
      <div class="card-body">
        <form>
          <div class="form-group">
            <input type="text" class="form-control" id="lobbyName" placeholder="Enter lobby name" [(ngModel)]="lobbyName" [ngModelOptions]="{standalone: true}">
          </div>
          <button type="submit" *ngIf="!created" (click)="onSubmit()" class="btn btn-block button">Create Lobby</button>
          <div *ngIf="scheduled" class="scheduled-game">
            <h4>Game Scheduled</h4>
            <p>Game will start at {{date}} {{time}}</p>
          </div>
        </form>
      </div>
      <div class="card-body code-section">
        <div *ngIf="joinCode != ''">
          <h4>Join Code</h4>
          <p>{{joinCode}}</p>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="userList.length > 0" class="col-md-4 user-list-container">
    <h4 style="color: white;">Users in lobby:</h4>
    <ul class="user-list">
      <li *ngFor="let user of userList" class="user-list-item" >
        <span>{{ user }}</span>
      </li>
    </ul>
  </div>

  <div *ngIf="scheduled" class="col-md-4 scoreboard-container">
    <app-live-score-board [scoreboard]="scoreBoard"></app-live-score-board>
  </div>
</div>
